name: Keep Supabase Alive

on:
  schedule:
    # Run approximately every 4-5 days
    # Cron: minute hour day-of-month month day-of-week
    # This runs at 2:00 AM UTC on Mondays and Fridays (every 3-4 days)
    - cron: '0 2 * * 1,5'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "Error: SUPABASE_URL secret is not set"
            exit 1
          fi
      - name: Ping Supabase
        run: |
          echo "Pinging Supabase..."
          curl -I "${SUPABASE_URL}" \
            -H "User-Agent: GitHub-Action-Keep-Alive" \
            --fail-with-body
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
