name: Keep Supabase Alive

on:
  schedule:
    # Run approximately every 4-5 days
    # Cron: minute hour day-of-month month day-of-week
    # This runs at 2:00 AM UTC on Mondays and Fridays (every 3-4 days)
    - cron: '0 2 * * 1,5'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "Error: SUPABASE_URL secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "Error: SUPABASE_ANON_KEY secret is not set"
            exit 1
          fi
      - name: Ping Supabase API
        run: |
          echo "Pinging Supabase..."
          echo "URL: ${SUPABASE_URL}/rest/v1/"
          curl -X GET "${SUPABASE_URL}/rest/v1/" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -v \
            --fail-with-body
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
